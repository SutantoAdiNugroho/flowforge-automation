services:
  postgres:
    image: postgres:16-alpine
    container_name: flowforge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
      POSTGRES_DB: flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowforge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowforge-backend
    environment:
      PORT: 5000
      DB_DSN: postgres://postgres:12345@postgres:5432/flowforge?sslmode=disable
      MIGRATE_ON_START: "true"
      JWT_SECRET: your-super-secret-key-change-in-production
      TOKEN_TTL: "24"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flowforge-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  flowforge-network:
    driver: bridge
